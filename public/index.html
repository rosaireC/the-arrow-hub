<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain's Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .heading-font { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <div id="splash-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50 transition-opacity duration-700">
        <div class="text-center animate-fade-in px-4">
            <svg class="w-32 h-32 mx-auto mb-6 text-indigo-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8m0 0V3m0 10h.01M5.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-18 0V12a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 12v4.5m-18 0v-2.25A2.25 2.25 0 015.25 9.75h13.5A2.25 2.25 0 0121 12v2.25m-18 0v-4.5"></path></svg>
            <h1 class="heading-font text-5xl font-extrabold text-white tracking-wider mb-2 uppercase">Captain's Log</h1>
            <p class="text-indigo-300 text-sm font-medium tracking-widest mb-8 uppercase">Tactical Fleet Management</p>
            <button data-action="dismiss-splash" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-10 rounded-full shadow-lg transition-transform transform hover:scale-105 cursor-pointer">BOARD VESSEL</button>
        </div>
    </div>

    <div id="auth-screen" class="hidden flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-8 text-center bg-slate-50 border-b border-slate-100">
                <h2 class="heading-font text-2xl font-bold text-slate-900">Vessel Access</h2>
                <p class="text-xs text-slate-500 mt-1">Enter your assigned vessel and credentials</p>
            </div>
            <div class="p-8 space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Vessel Name</label>
                    <input type="text" id="auth-vessel" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="e.g., Black Magic">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Crew Username</label>
                    <input type="text" id="auth-username" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="Username">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Password</label>
                    <input type="password" id="auth-password" class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none" placeholder="••••••••">
                </div>
                <div id="auth-error" class="text-rose-500 text-sm hidden font-medium text-center"></div>
                
                <div class="flex gap-2 pt-2">
                    <button type="button" data-action="submit-login" class="w-1/2 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 rounded-lg transition shadow-md cursor-pointer text-sm">Login</button>
                    <button type="button" data-action="submit-register" class="w-1/2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg transition shadow-md cursor-pointer text-sm">Register</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex-col flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 space-y-6">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-900 text-white p-6 rounded-2xl shadow-lg">
            <div class="flex items-center space-x-4 mb-4 sm:mb-0">
                <img id="header-profile-pic" src="https://ui-avatars.com/api/?name=Crew&background=4f46e5&color=fff" class="w-12 h-12 rounded-full border-2 border-indigo-500 object-cover">
                <div>
                    <h2 class="heading-font text-2xl font-bold tracking-tight">S/V <span id="display-vessel" class="text-indigo-400">Vessel</span></h2>
                    <p class="text-slate-400 text-sm">Crew: <span id="display-username" class="font-medium text-white">Name</span> <span id="admin-badge" class="hidden bg-amber-500/20 text-amber-400 text-[10px] px-1.5 py-0.5 rounded ml-1 font-bold uppercase">Captain</span></p>
                </div>
            </div>
            <button data-action="logout" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-2 px-4 rounded-lg text-sm border border-slate-700 cursor-pointer">Disembark</button>
        </div>

        <div class="flex space-x-2 bg-white p-1 rounded-xl shadow-sm border border-slate-200">
            <button data-action="nav-tab" data-target="panel-races" class="nav-btn flex-1 py-2 text-sm font-bold rounded-lg bg-indigo-50 text-indigo-700 cursor-pointer">Racing Schedule</button>
            <button data-action="nav-tab" data-target="panel-news" class="nav-btn flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-50 cursor-pointer">News Feed</button>
            <button data-action="nav-tab" data-target="panel-settings" class="nav-btn flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:bg-slate-50 cursor-pointer">My Gear & Settings</button>
        </div>

        <div id="panel-races" class="nav-panel space-y-6">
            <div id="admin-race-creator" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Draft New Event</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2"><label class="block text-xs font-bold text-slate-500 mb-1">Race Name</label><input type="text" id="ev-name" class="w-full p-2 border border-slate-200 rounded outline-none focus:border-indigo-500 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Start Date</label><input type="date" id="ev-date" class="w-full p-2 border border-slate-200 rounded outline-none text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Spaces</label><input type="number" id="ev-spaces" class="w-full p-2 border border-slate-200 rounded outline-none text-sm" placeholder="10"></div>
                    <div class="md:col-span-4 flex justify-end"><button data-action="create-race" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold py-2 px-6 rounded cursor-pointer">Log Race</button></div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Fleet Manifest</h3>
                <div id="race-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="panel-news" class="nav-panel hidden space-y-6">
            <div id="admin-news-creator" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider border-b border-slate-100 pb-2">Broadcast to Crew</h3>
                <textarea id="news-text" rows="3" class="w-full p-3 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 text-sm" placeholder="What's the plan, Captain?"></textarea>
                <div class="flex items-center justify-between">
                    <input type="file" id="news-image" accept="image/*" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    <button data-action="post-news" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-lg text-sm cursor-pointer shadow-sm">Post Broadcast</button>
                </div>
            </div>
            <div id="news-feed-container" class="space-y-4"></div>
        </div>

        <div id="panel-settings" class="nav-panel hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                
                <div>
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Profile & Identification</h3>
                    <div class="flex items-center space-x-6">
                        <img id="settings-pic-preview" src="" class="w-20 h-20 rounded-full bg-slate-100 border border-slate-200 object-cover">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Upload Photo</label>
                            <input type="file" id="settings-pic-upload" accept="image/*" class="text-xs text-slate-500 mb-2">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Automated Notifications</h3>
                    <div class="space-y-3 max-w-sm">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Email Address</label>
                            <input type="email" id="settings-email" class="w-full p-2 border border-slate-200 rounded outline-none text-sm" placeholder="crew@email.com">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Phone Number (SMS)</label>
                            <input type="tel" id="settings-phone" class="w-full p-2 border border-slate-200 rounded outline-none text-sm" placeholder="555-123-4567">
                        </div>
                        <div class="pt-2 space-y-2">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" id="pref-email" class="rounded text-indigo-600 w-4 h-4 cursor-pointer">
                                <span class="text-sm font-semibold text-slate-700">Receive Email Reminders</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" id="pref-sms" class="rounded text-indigo-600 w-4 h-4 cursor-pointer">
                                <span class="text-sm font-semibold text-slate-700">Receive Text (SMS) Reminders</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <button data-action="save-settings" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-lg text-sm cursor-pointer shadow">Save Settings</button>
                    <span id="settings-save-notice" class="text-emerald-600 text-xs font-bold ml-3 hidden">Settings Saved!</span>
                </div>
            </div>
        </div>

    <script>
        let db = { users: [], races: [], news: [] };
        let currentUser = null;

        async function init() {
            try {
                const res = await fetch('/api/data');
                db = await res.json();
            } catch (e) { console.warn("Using default memory array"); }
        }
        init();

        // DELTA MERGE FUNCTION: Sends only the targeted change, then pulls the freshly merged DB
        async function saveDB(mutationType, mutationData) {
            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mutation: mutationType, data: mutationData })
                });
                
                const response = await res.json();
                
                // Instantly update our local screen with the server's combined truth
                if (response.status === 'success' && response.db) {
                    db = response.db;
                    
                    // Keep our currentUser object synced with the DB version
                    if (currentUser) {
                        const updatedMe = db.users.find(u => u.username === currentUser.username && u.vessel === currentUser.vessel);
                        if (updatedMe) currentUser = updatedMe;
                    }
                    
                    if (currentUser) {
                        renderRaces();
                        renderNews();
                    }
                }
            } catch (e) { console.error("Save failed", e); }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        document.addEventListener('click', async function(e) {
            const target = e.target.closest('[data-action]');
            if (!target) return;
            const action = target.getAttribute('data-action');
