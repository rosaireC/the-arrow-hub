<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain's Log | Fleet Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .heading-font { font-family: 'Outfit', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <div id="splash-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50 transition-opacity duration-700">
        <div class="text-center px-4">
            <svg class="w-28 h-28 mx-auto mb-6 text-indigo-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v14m0-14l6 12h-6m0-14L6 12h6m-9 7c1.5 0 3-1 4.5-1s3 1 4.5 1 3-1 4.5-1 3 1 4.5 1"/>
            </svg>
            <h1 class="heading-font text-5xl font-extrabold text-white tracking-wider mb-2 uppercase">Captain's Log</h1>
            <p class="text-indigo-400 text-sm font-medium tracking-widest mb-10 uppercase">Tactical Fleet Management</p>
            <button onclick="document.getElementById('splash-screen').style.display='none'; document.getElementById('auth-screen').style.display='flex';" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-12 rounded-full shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-transform transform hover:scale-105 cursor-pointer">BOARD VESSEL</button>
        </div>
    </div>

    <main class="flex-grow flex flex-col items-center w-full">
        
        <div id="auth-screen" style="display: none;" class="flex-grow flex items-center justify-center p-4 w-full">
            <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
                <div class="p-8 text-center bg-slate-50 border-b border-slate-100">
                    <svg class="w-12 h-12 mx-auto mb-4 text-indigo-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v14m0-14l6 12h-6m0-14L6 12h6m-9 7c1.5 0 3-1 4.5-1s3 1 4.5 1 3-1 4.5-1 3 1 4.5 1"/>
                    </svg>
                    <h2 class="heading-font text-2xl font-extrabold text-slate-900">Vessel Access</h2>
                    <p class="text-xs text-slate-500 mt-2">Enter your assigned vessel and credentials</p>
                </div>
                <div class="p-8 space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Vessel Name</label>
                        <input type="text" id="auth-vessel" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition" placeholder="e.g., Black Magic">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Crew Username</label>
                        <input type="text" id="auth-username" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition" placeholder="Username">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Password</label>
                        <input type="password" id="auth-password" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition" placeholder="••••••••">
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" id="auth-remember" class="rounded text-indigo-600 w-4 h-4 cursor-pointer accent-indigo-600">
                            <span class="text-sm font-semibold text-slate-600">Keep me logged in</span>
                        </label>
                    </div>

                    <div id="auth-error" class="text-rose-500 text-sm hidden font-medium text-center bg-rose-50 p-2 rounded-lg border border-rose-100"></div>
                    
                    <div class="flex gap-3 pt-2">
                        <button type="button" data-action="submit-login" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3.5 rounded-xl transition shadow-md cursor-pointer text-sm">Login</button>
                        <button type="button" data-action="submit-register" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3.5 rounded-xl transition shadow-md cursor-pointer text-sm">Register</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard-screen" style="display: none;" class="flex-col flex-grow max-w-5xl mx-auto w-full p-4 md:p-8 space-y-6">
            
            <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-900 text-white p-6 rounded-3xl shadow-xl bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]">
                <div class="flex items-center space-x-5 mb-4 sm:mb-0">
                    <img id="header-profile-pic" src="" class="w-16 h-16 rounded-full border-2 border-indigo-400 shadow-lg object-cover bg-slate-800">
                    <div>
                        <div class="flex items-center mb-1">
                            <svg class="w-6 h-6 text-indigo-400 mr-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v14m0-14l6 12h-6m0-14L6 12h6m-9 7c1.5 0 3-1 4.5-1s3 1 4.5 1 3-1 4.5-1 3 1 4.5 1"/>
                            </svg>
                            <h2 class="heading-font text-3xl font-extrabold tracking-tight">S/V <span id="display-vessel" class="text-indigo-400">Vessel</span></h2>
                        </div>
                        <div class="flex items-center mt-1">
                            <p class="text-slate-300 text-sm mr-2">Logged in as <span id="display-username" class="font-bold text-white">Name</span></p>
                            <span id="role-badge" class="hidden text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider shadow-sm">Role</span>
                        </div>
                    </div>
                </div>
                <button data-action="logout" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-6 rounded-xl text-sm border border-slate-700 transition cursor-pointer shadow-inner">Disembark</button>
            </div>

            <div class="flex flex-wrap gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                <button data-action="nav-tab" data-target="panel-races" class="nav-btn flex-1 min-w-[120px] py-2.5 text-sm font-bold rounded-xl bg-indigo-50 text-indigo-700 transition cursor-pointer">Racing Schedule</button>
                <button data-action="nav-tab" data-target="panel-crew" class="nav-btn flex-1 min-w-[120px] py-2.5 text-sm font-bold rounded-xl text-slate-500 hover:bg-slate-50 transition cursor-pointer">Crew Roster</button>
                <button data-action="nav-tab" data-target="panel-news" class="nav-btn flex-1 min-w-[120px] py-2.5 text-sm font-bold rounded-xl text-slate-500 hover:bg-slate-50 transition cursor-pointer">News Feed</button>
                <button data-action="nav-tab" data-target="panel-settings" class="nav-btn flex-1 min-w-[120px] py-2.5 text-sm font-bold rounded-xl text-slate-500 hover:bg-slate-50 transition cursor-pointer">My Gear</button>
            </div>

            <div id="panel-races" class="nav-panel space-y-6">
                
                <div id="admin-race-creator" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-5 flex items-center">
                        <span class="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg mr-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v14m0-14l6 12h-6m0-14L6 12h6m-9 7c1.5 0 3-1 4.5-1s3 1 4.5 1 3-1 4.5-1 3 1 4.5 1"/></svg>
                        </span>
                        Draft New Event
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">Race/Event Name *</label>
                            <input type="text" id="ev-name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm" placeholder="e.g., Summer Regatta">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">Location</label>
                            <input type="text" id="ev-location" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm" placeholder="e.g., Royal Yacht Club">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Start Date *</label>
                            <input type="date" id="ev-date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Start Time</label>
                            <input type="time" id="ev-start-time" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Finish Date</label>
                            <input type="date" id="ev-finish-date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Finish Time</label>
                            <input type="time" id="ev-finish-time" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Crew Capacity</label>
                            <input type="number" id="ev-spaces" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-white transition text-sm" placeholder="10">
                        </div>
                        <div class="md:col-span-3">
                            <label class="block text-xs font-bold text-slate-500 mb-1">Event Notes</label>
                            <input type="text" id="ev-notes" class="w-full p-3 bg-slate
